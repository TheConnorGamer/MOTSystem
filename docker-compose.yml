version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/vehicleguard?schema=public
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - DVSA_CLIENT_ID=${DVSA_CLIENT_ID}
      - DVSA_CLIENT_SECRET=${DVSA_CLIENT_SECRET}
      - DVSA_API_KEY=${DVSA_API_KEY}
      - DVSA_SCOPE=${DVSA_SCOPE}
      - DVSA_TOKEN_URL=${DVSA_TOKEN_URL}
      - DVSA_API_BASE=${DVSA_API_BASE}
      - RESEND_API_KEY=${RESEND_API_KEY}
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vehicleguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run worker
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/vehicleguard?schema=public
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - DVSA_CLIENT_ID=${DVSA_CLIENT_ID}
      - DVSA_CLIENT_SECRET=${DVSA_CLIENT_SECRET}
      - DVSA_API_KEY=${DVSA_API_KEY}
      - DVSA_SCOPE=${DVSA_SCOPE}
      - DVSA_TOKEN_URL=${DVSA_TOKEN_URL}
      - DVSA_API_BASE=${DVSA_API_BASE}
      - RESEND_API_KEY=${RESEND_API_KEY}
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
